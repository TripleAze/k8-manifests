apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rds-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        # After terraform apply, replace this with the actual secret name from the output
        key: rds-db-instance/solo-devops/PLACEHOLDER
        property: host
    - secretKey: username
      remoteRef:
        key: rds-db-instance/solo-devops/PLACEHOLDER
        property: username
    - secretKey: password
      remoteRef:
        key: rds-db-instance/solo-devops/PLACEHOLDER
        property: password
    - secretKey: dbname
      remoteRef:
        key: rds-db-instance/solo-devops/PLACEHOLDER
        property: dbname
