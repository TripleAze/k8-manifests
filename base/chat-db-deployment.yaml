apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chat-db-pvc
  labels:
    app: chat-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-db
  labels:
    app: chat-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: chat-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: chat-db-secret
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: chat-db-pvc
